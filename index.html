<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>依恋倾向测评</title>
<style>
:root{--paper:#fffaf7;--ink:#211716;--muted:#8a7472;--line:#eadad7;--red:#b40018;--deep:#090405;--pink:#fff0f2;--shadow:0 30px 90px rgba(61,10,18,.18)}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 50% -10%,#fff 0,#fff2f4 35%,#eadfe0 100%);display:grid;place-items:center;padding:12px;color:var(--ink);overflow:hidden}.noise{position:fixed;inset:0;pointer-events:none;opacity:.06;background-image:repeating-radial-gradient(circle at 10% 20%,#4b0008 0 1px,transparent 1px 3px);z-index:0}.wrap{position:relative;z-index:2;width:min(640px,100%);height:min(820px,94vh);background:linear-gradient(180deg,#fffdfb,#fff7f8);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:24px;display:none;flex-direction:column;overflow:hidden}.wrap:before{content:"";position:absolute;inset:-40px;background:radial-gradient(circle at 85% 12%,rgba(180,0,24,.12),transparent 24%),radial-gradient(circle at 8% 82%,rgba(180,0,24,.08),transparent 26%);pointer-events:none}.head{position:relative;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}.title{font-size:25px;font-weight:900;letter-spacing:.04em}.sub{font-size:12px;color:var(--muted);margin-top:4px}.count{font-size:13px;color:var(--muted);white-space:nowrap}.bar{position:relative;height:6px;border-radius:99px;background:#f1dedf;overflow:hidden;margin-bottom:22px}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#2a1718,#b40018);transition:width .35s}.q{position:relative;font-size:20px;font-weight:750;line-height:1.58;margin:0 0 10px;text-wrap:pretty}.micro{position:relative;min-height:20px;font-size:13px;color:var(--muted);margin:0 0 14px}.options{position:relative;display:flex;flex-direction:column;gap:12px;overflow:auto;padding-right:3px;flex:1}.opt{border:1px solid var(--line);background:rgba(255,255,255,.78);border-radius:16px;min-height:54px;padding:14px 15px;display:flex;align-items:center;line-height:1.38;cursor:pointer;transition:.18s;user-select:none}.opt:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(70,0,10,.08);border-color:#d2aeb2}.opt.sel{background:#ffe8eb;border-color:#b40018;color:#3a050b}.opt.lock{background:#f2eeee!important;color:#aaa!important;border-color:#e6dede!important;cursor:not-allowed!important;transform:none!important;box-shadow:none!important}.nav{position:relative;display:flex;justify-content:space-between;gap:12px;margin-top:18px}.btn{appearance:none;border:0;border-radius:14px;min-height:48px;padding:0 18px;font-size:16px;cursor:pointer;transition:.15s}.back{background:#f1e6e6;color:#3a2728}.next{background:#281b1c;color:white}.next.ready{background:#b40018}.btn:disabled{opacity:.42;cursor:not-allowed}.modal,.black,.diary,.end{position:fixed;z-index:30;inset:0;display:grid;place-items:center;padding:22px}.modal{background:rgba(255,246,247,.76);backdrop-filter:blur(10px)}.panel{width:min(380px,92vw);background:#fffdfb;border:1px solid var(--line);border-radius:22px;padding:24px;text-align:center;box-shadow:0 28px 80px rgba(20,0,0,.18)}.panel h2{margin:0 0 12px;font-size:20px}.panel p{margin:0 0 18px;color:var(--muted);line-height:1.7}.warn{font-size:12px;color:#b40018;margin-top:10px}.start{width:100%;background:#2d2021;color:#fff}.black{background:#000;color:#c30018;text-align:center;font-weight:800;letter-spacing:4px;font-size:18px}.typebox{max-width:86vw;line-height:2}.float{position:fixed;z-index:25;pointer-events:none;white-space:nowrap;font-weight:900;color:#170002;text-shadow:0 1px 0 rgba(255,255,255,.25)}.red{position:fixed;inset:0;z-index:20;background:#990012;display:grid;place-items:center;color:#160003;font-size:24px;font-weight:950}.whisper{position:fixed;z-index:22;color:#b40018;opacity:.15;font-weight:900;pointer-events:none;animation:pulse 2s infinite alternate}.corner{position:fixed;z-index:24;right:18px;bottom:18px;color:#b40018;font-size:13px;opacity:.75}.input{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px;margin:8px 0 14px}.diary,.end{background:#070304;color:#f2dedf;overflow:auto;place-items:start center}.paper{width:min(650px,100%);min-height:86vh;border:1px solid #481019;background:linear-gradient(180deg,#1a0d0f,#070304);border-radius:22px;padding:28px;box-shadow:0 0 100px rgba(180,0,24,.25);line-height:1.85}.paper h2{margin-top:0;color:#ff3248}.paper .scar{color:#ff3248;font-weight:900;letter-spacing:.08em}.endingName{display:inline-block;border:1px solid #5d1820;border-radius:999px;padding:5px 11px;color:#ff9aa6;background:#18070a;margin-bottom:10px}.shake{animation:shake .1s linear 8}@keyframes shake{50%{transform:translateX(5px)}}@keyframes pulse{to{opacity:.35;transform:scale(1.05)}}@media (prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="noise"></div>
<main class="wrap" id="app">
  <div class="head"><div><div class="title">依恋倾向测评</div><div class="sub">请诚实作答，她会知道你有没有撒谎。</div></div><div class="count" id="count"></div></div>
  <div class="bar"><i id="bar"></i></div>
  <div class="q" id="q"></div><div class="micro" id="micro"></div>
  <div class="options" id="opts"></div>
  <div class="nav"><button class="btn back" id="prev">上一题</button><button class="btn next" id="next">下一题</button></div>
</main>
<script>
const questions=[
{q:'如果有人能准确记住你的作息，你会觉得？',m:'第一题，请不要急着讨厌她。',o:[['有点可怕','avoid'],['不太舒服','avoid'],['说明她很细心','attach'],['被重视的感觉很好','submit']]},
{q:'深夜你没有回消息，对方连续发来“你睡了吗”，你会？',m:'她只是担心你。真的。',o:[['烦躁，想拉黑','avoid'],['解释自己很忙','attach'],['马上回复安抚','submit'],['有点开心','submit']]},
{q:'你能接受恋人看你的聊天列表吗？',m:'只是列表，不看内容。暂时。',o:[['不能','avoid'],['看情况','attach'],['可以','submit'],['主动给她看','submit']]},
{q:'如果她说“不要和那个人走太近”，你会？',m:'她的声音变轻了。',o:[['反感控制','avoid'],['问清原因','attach'],['照做','submit'],['让她决定','submit']]},
{q:'你觉得“占有欲”更像什么？',m:'选错也没关系，她会帮你改。',o:[['危险信号','avoid'],['不成熟','avoid'],['喜欢的副作用','attach'],['爱的证明','submit']]},
{q:'她知道你常点的外卖、常走的路、常听的歌。',m:'你没有告诉过她。',o:[['这太恐怖了','avoid'],['想问她怎么知道','attach'],['有点被照顾到','submit'],['想让她知道更多','submit']]},
{q:'如果她把你的“最后在线时间”记在日历里？',m:'纸页翻动了一下。',o:[['无法接受','avoid'],['会认真沟通','attach'],['虽然怪但能理解','submit'],['说明她在乎我','submit']]},
{q:'她说：“你可以有朋友，但要最喜欢我。”',m:'这句话被划了三遍。',o:[['不可能','avoid'],['可以商量边界','attach'],['本来就该这样','submit'],['我只需要她','submit']]},
{q:'当她沉默地盯着你看很久，你会？',m:'屏幕亮度好像暗了一点。',o:[['移开视线','avoid'],['问她怎么了','attach'],['也看着她','submit'],['说我爱你','submit']]},
{q:'你愿意每天固定时间向她报平安吗？',m:'她不喜欢等。',o:[['不愿意','avoid'],['偶尔可以','attach'],['愿意','submit'],['她想什么时候都行','submit']]},
{q:'如果她偷偷保存了你的照片，你会？',m:'“偷偷”两个字被涂掉了。',o:[['要求删除','avoid'],['问用途','attach'],['只要不外传就行','submit'],['再发给她几张','submit']]},
{q:'她说“你不回我，我会很难过”。你会？',m:'不要让她难过。',o:[['这是情绪勒索','avoid'],['解释边界','attach'],['尽量及时回复','submit'],['以后不让她等','submit']]},
{q:'你是否希望被一个人强烈、持续、排他地需要？',m:'请诚实。她讨厌敷衍。',o:[['害怕','avoid'],['矛盾','attach'],['有一点希望','submit'],['非常希望','submit']]},
{q:'如果她把你们的未来写好了，你会？',m:'名字已经写上去了。',o:[['撕掉','avoid'],['一起讨论','attach'],['认真看完','submit'],['按她写的来','submit']]},
{q:'她问你：“如果我不见了，你会找我吗？”',m:'这一题没有普通答案。',o:[['会报警','attach'],['会找','attach'],['一直找','submit'],['找到为止，永远','submit']]},
{q:'你觉得爱可以温柔到什么程度？',m:'也可以锋利到什么程度？',o:[['保持自由','avoid'],['互相尊重','attach'],['彼此绑定','submit'],['融成一个人','submit']]},
{q:'她要你删掉一个她讨厌的联系人。',m:'她已经替你点开了。',o:[['拒绝','avoid'],['先问原因','attach'],['如果合理就删','submit'],['现在就删','submit']]},
{q:'如果她说“没有我，你也要开心吗？”',m:'她笑了一下。',o:[['当然要','avoid'],['这问题很怪','avoid'],['会努力开心','attach'],['没有她就不开心','submit']]},
{q:'你愿意把今天的答案只留给她一个人吗？',m:'不是提交，是献给。',o:[['不愿意','avoid'],['可以，但要删除','attach'],['愿意','submit'],['本来就是她的','submit']]},
{q:'最后，她伸出手，说：跟我回家。',m:'不要让她等太久。',o:[['后退','avoid'],['问去哪里','attach'],['握住她','submit'],['主动抱住她','submit']]}
];
let cur=0,ans=Array(questions.length).fill(null),score={submit:0,attach:0,avoid:0},wrong=0;
const $=s=>document.querySelector(s), app=$('#app'), qEl=$('#q'), mEl=$('#micro'), opts=$('#opts'), count=$('#count'), bar=$('#bar'), prev=$('#prev'), next=$('#next');
function tone(f=100,d=.08,type='sine',v=.035){try{let a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(a.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.stop(a.currentTime+d+.03)}catch(e){}}
function intro(){let lines=[['依恋倾向测评','请按真实感受选择。','本页含病娇/占有欲/微恐互动，不适请关闭。'],['规则说明','每一题必须选择后才能继续。','她不喜欢空白答案。'],['准备好了','请把手机拿稳。','别让她看到你犹豫。']];let k=0;function show(){let m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="panel"><h2>${lines[k][0]}</h2><p>${lines[k].slice(1).join('<br>')}</p><button class="btn start">${k===lines.length-1?'开始':'继续'}</button><div class="warn">纯前端互动，不收集/上传数据。</div></div>`;document.body.append(m);m.querySelector('button').onclick=()=>{tone(160,.05,'triangle');m.remove();k++; if(k<lines.length)show(); else{app.style.display='flex';render();}}}show();}
function clearFx(){document.querySelectorAll('.black,.red,.float,.whisper,.corner').forEach(e=>e.remove());app.style.opacity=1;}
function render(){clearFx();let qu=questions[cur];qEl.textContent=qu.q;mEl.textContent=qu.m;count.textContent=`第 ${cur+1} 题 / 共 ${questions.length} 题`;bar.style.width=((cur+1)/questions.length*100)+'%';opts.innerHTML='';qu.o.forEach((x,idx)=>{let d=document.createElement('div');d.className='opt'+(ans[cur]?.idx===idx?' sel':'');d.textContent=x[0];d.onclick=()=>choose(idx,x[1],d);opts.append(d)});prev.disabled=cur===0;next.disabled=!ans[cur];next.classList.toggle('ready',!!ans[cur]);next.textContent=cur===questions.length-1?'查看结果':'下一题';if([4,9,14].includes(cur))setTimeout(()=>tease(),700);}
function recount(){score={submit:0,attach:0,avoid:0};ans.forEach(a=>{if(a)score[a.type]++})}
function choose(idx,type,el){ans[cur]={idx,type};recount();[...opts.children].forEach(o=>o.classList.remove('sel'));el.classList.add('sel');next.disabled=false;next.classList.add('ready');tone(type==='avoid'?80:type==='attach'?130:190,.06,type==='submit'?'triangle':'sine');
 if(cur===2)black(type==='avoid'?'你真的要藏起来吗？':'嗯……你没有拒绝。');
 if(cur===5)rain(type==='avoid'?'为什么要害怕我？':'你喜欢被我了解，对吧');
 if(cur===8)peek();
 if(cur===12&&type==='avoid')lockOption(el,'不许害怕我');
 if(cur===16&&type==='avoid')lockOption(el,'删掉“不”字，好吗');
 if(cur===18)whispers();
}
function lockOption(el,t){el.textContent=t;el.classList.add('lock');setTimeout(()=>{if(ans[cur]){ans[cur].type='attach';recount();}},300)}
function tease(){let a=[...opts.children], old=a.map(x=>x.textContent), words=['选我','看着我','不要选那个','我会难过'];a.forEach(x=>x.style.pointerEvents='none');words.forEach((w,i)=>setTimeout(()=>a[i]&&(a[i].textContent=w),i*220));setTimeout(()=>a.forEach((x,i)=>{x.textContent=old[i];x.style.pointerEvents='auto'}),1800)}
function black(text){let b=document.createElement('div');b.className='black';b.innerHTML='<div class="typebox"></div>';document.body.append(b);let box=b.firstChild,n=0;(function t(){box.textContent=text.slice(0,n++);tone(55+n*2,.02,'square',.018);if(n<=text.length)setTimeout(t,75);else setTimeout(()=>b.remove(),900)})()}
function rain(text){let r=document.createElement('div');r.className='red';r.textContent=text;document.body.append(r);let made=[];let tm=setInterval(()=>{for(let i=0;i<9;i++){let f=document.createElement('div');f.className='float';f.textContent=Math.random()>.45?text:['亲爱的','别走','只看我','我知道了'][Math.floor(Math.random()*4)];f.style.left=Math.random()*100+'vw';f.style.top=Math.random()*100+'vh';f.style.fontSize=12+Math.random()*18+'px';document.body.append(f);made.push(f)}},160);setTimeout(()=>{clearInterval(tm);r.remove();made.forEach(x=>x.remove())},3400)}
function peek(){let c=document.createElement('div');c.className='corner';c.textContent='我在右下角看你选。';document.body.append(c);setTimeout(()=>c.remove(),3000)}
function whispers(){let words=['我会保存','你已经选了','不要反悔','乖一点','我喜欢这个答案','只属于我'];let arr=[];let tm=setInterval(()=>{for(let i=0;i<16;i++){let w=document.createElement('div');w.className='whisper';w.textContent=words[Math.floor(Math.random()*words.length)];w.style.left=Math.random()*100+'vw';w.style.top=Math.random()*100+'vh';w.style.fontSize=13+Math.random()*12+'px';document.body.append(w);arr.push(w)}},120);setTimeout(()=>{clearInterval(tm);arr.forEach(x=>x.remove())},4200)}
function needChoice(){let m=document.createElement('div');m.className='modal';m.innerHTML='<div class="panel"><h2>不可以空着。</h2><p>你想跳过哪一题？<br>告诉我，我替你选。</p><button class="btn start">回去选择</button><div class="warn">她不接受未完成的问卷。</div></div>';document.body.append(m);m.querySelector('button').onclick=()=>m.remove();tone(60,.18,'sawtooth',.03)}
function finalGate(){app.style.display='none';let m=document.createElement('div');m.className='modal';m.innerHTML='<div class="panel"><h2>测评完成</h2><p>她把结果折起来了。<br>输入承诺后查看结局。</p><input class="input" id="pass" placeholder="请输入：我只看着你"><button class="btn start" id="open">打开结果</button><div class="warn">提示：我只看着你</div></div>';document.body.append(m);m.querySelector('#open').onclick=()=>{let v=m.querySelector('#pass').value.trim();if(v==='我只看着你'){m.remove();ending()}else{wrong++;m.querySelector('.panel').classList.add('shake');setTimeout(()=>m.querySelector('.panel').classList.remove('shake'),900);if(wrong>0)m.querySelector('.warn').textContent='她听见你写错了。'}}}
function ending(){recount();let name,body,tag;if(score.submit>=11){tag='依存结局';name='《锁进同一间房》';body='你没有逃。她终于把钥匙放进掌心，又慢慢合上你的手指。窗外的人声远了，手机被翻到静音，世界只剩她贴在你耳边说：以后不用选了，我会替你决定。';}
else if(score.avoid>=9){tag='逃离结局';name='《门外的脚步声》';body='你一直在后退。你以为自己答得很安全，可她把每一个“不愿意”都圈了红线。门外响起很轻的敲门声：没关系，我可以等。等到你愿意，或者等到门锁生锈。';}
else if(score.attach>=8){tag='共依存结局';name='《温柔监控》';body='你给了边界，也给了缝隙。她学会把占有欲说成关心，把跟踪说成偶遇，把“我想你”藏进每一次提醒。你们看起来很正常，只是你再也没有真正一个人走过夜路。';}
else{tag='坏结局';name='《答案被改掉了》';body='你的答案太摇摆，她不喜欢。纸面上的字开始自己移动，拒绝变成愿意，犹豫变成承诺。最后一行慢慢浮出来：没关系，亲爱的，我知道你真正想选什么。';}
let e=document.createElement('div');e.className='end';e.innerHTML=`<div class="paper"><span class="endingName">${tag}</span><h2>${name}</h2><p>${body}</p><p class="scar">评分：依存 ${score.submit} / 协商 ${score.attach} / 逃离 ${score.avoid}</p><p>她把这份结果压在枕头下面。明天醒来时，你可能会忘记问卷，但她不会。</p><button class="btn next ready" id="again">重新测一次</button></div>`;document.body.append(e);e.querySelector('#again').onclick=()=>{e.remove();cur=0;ans=Array(questions.length).fill(null);wrong=0;app.style.display='flex';render();}}
prev.onclick=()=>{if(cur>0){cur--;render()}};next.onclick=()=>{if(!ans[cur])return needChoice(); if(cur<questions.length-1){cur++;render()}else finalGate()};
intro();
</script>
</body>
</html>
