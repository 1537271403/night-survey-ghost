<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>亲密关系安全测试</title><style>
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#050203;color:#f7e9ea;display:grid;place-items:center;padding:12px;overflow:hidden}body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% -10%,#3a0710,transparent 35%),radial-gradient(circle at 80% 90%,#23040a,transparent 32%),repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px);pointer-events:none}.phone{position:relative;width:min(430px,100%);height:min(820px,96vh);background:linear-gradient(#13090b,#070304);border:1px solid #431019;border-radius:34px;box-shadow:0 0 0 8px #080405,0 35px 110px rgba(180,0,30,.22);overflow:hidden;display:none;flex-direction:column}.top{height:72px;border-bottom:1px solid #351018;display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.35)}.avatar{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 40% 30%,#ffb8c0,#9b0018 58%,#200207);box-shadow:0 0 24px rgba(255,40,70,.28)}.name{font-weight:800}.status{font-size:12px;color:#ff8a98}.log{flex:1;overflow:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}.msg{max-width:86%;padding:12px 14px;border-radius:18px;line-height:1.55;font-size:15px;white-space:pre-wrap;animation:pop .18s ease}.her{align-self:flex-start;background:#211013;border:1px solid #43151d;color:#ffeef0;border-bottom-left-radius:5px}.me{align-self:flex-end;background:#7f0013;color:white;border-bottom-right-radius:5px}.sys{align-self:center;max-width:94%;text-align:center;color:#b9979b;font-size:12px;padding:5px 8px}.choices{padding:10px 12px 16px;border-top:1px solid #321016;background:rgba(0,0,0,.32);display:grid;gap:9px}.choice{border:1px solid #5a1b25;background:#19090c;color:#fff;border-radius:16px;min-height:46px;padding:11px 12px;font-size:15px;text-align:left;cursor:pointer}.choice:hover{border-color:#b4001c;background:#2a0b10}.choice.bad{color:#ff9aa5}.choice.good{color:#ffd0d5}.choice:disabled{opacity:.35;cursor:not-allowed}.meter{height:4px;background:#25080d}.meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,#802,#ff304e);transition:.3s}.modal,.glitch,.ending{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:22px}.modal{background:rgba(5,2,3,.78);backdrop-filter:blur(10px)}.panel{width:min(390px,92vw);background:#120709;border:1px solid #5a1822;border-radius:24px;padding:24px;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.5)}h1,h2{margin:0 0 12px}.panel p{color:#c9a7ab;line-height:1.7}.btn{border:0;border-radius:14px;background:#b4001c;color:#fff;min-height:48px;padding:0 18px;font-size:16px;cursor:pointer;width:100%}.warn{color:#ff6475;font-size:12px;margin-top:12px}.input{width:100%;border:1px solid #5a1822;background:#080304;color:#fff;border-radius:14px;padding:13px;margin:10px 0 14px;font-size:16px}.glitch{background:#000;color:#e00022;font-weight:900;letter-spacing:5px;text-align:center}.float{position:fixed;z-index:18;color:#ff304e;font-weight:900;opacity:.18;pointer-events:none;animation:pulse 1.2s infinite alternate}.ending{background:#050203;overflow:auto;place-items:start center}.paper{width:min(620px,100%);min-height:88vh;margin:auto 0;border:1px solid #5b1822;background:linear-gradient(#17080b,#070203);border-radius:24px;padding:28px;line-height:1.85}.tag{display:inline-block;border:1px solid #78202b;color:#ff9aa6;border-radius:999px;padding:4px 10px;font-size:13px}.score{color:#ff6475;font-weight:800}.shake{animation:shake .1s linear 7}@keyframes pop{from{transform:translateY(6px);opacity:0}}@keyframes pulse{to{opacity:.38;transform:scale(1.08)}}@keyframes shake{50%{transform:translateX(5px)}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head><body><main class="phone" id="phone"><div class="top"><div class="avatar"></div><div><div class="name">未保存联系人</div><div class="status" id="status">正在输入…</div></div></div><div class="meter"><i id="meter"></i></div><section class="log" id="log"></section><section class="choices" id="choices"></section></main><script>
const scenes=[
{her:['你终于点进来了。','别装作只是好奇。你看见标题的时候，心跳快了一下，对吧？'],c:[['我只是随便看看','resist'],['你是谁？','fear'],['嗯，我进来了','obey']]},
{her:['先做个小测试。','如果我记得你今晚几点睡，你会生气吗？'],c:[['会，很恶心','resist'],['你怎么知道？','fear'],['不会，你是在关心我','obey']]},
{her:['我不喜欢你说“恶心”。','换个温柔点的词。'],mutate:true,c:[['这叫越界','resist'],['……有点吓人','fear'],['好，是我说错了','obey']]},
{her:['你微信里那个经常找你的人是谁？','别急，我没有看。','我只是猜得到。'],c:[['和你没关系','resist'],['普通朋友','fear'],['我可以不理他/她','obey']]},
{her:['如果我说不准你回那个人消息呢？'],c:[['你管不了我','resist'],['为什么？','fear'],['那我不回了','obey']]},
{her:['真乖。','或者……真不乖。','我会根据你的答案记下来。'],effect:'rain',c:[['你别记','resist'],['你到底想干嘛','fear'],['记吧，只给你看','obey']]},
{her:['现在，把手机拿近一点。','我要确认你没有笑。'],c:[['幼稚','resist'],['我没有笑','fear'],['拿近了','obey']]},
{her:['你能接受恋人偶尔查岗吗？','不要说大道理，说你会不会。'],c:[['不会','resist'],['偶尔可以','fear'],['随时可以','obey']]},
{her:['如果我哭了，说“你是不是不爱我了”。'],c:[['这是绑架','resist'],['我会解释','fear'],['我会抱你','obey']]},
{her:['解释没有用。','抱也不够。','我要的是你主动留下。'],effect:'black',c:[['我偏要走','resist'],['我会考虑','fear'],['我留下','obey']]},
{her:['最后一题。','你愿不愿意把“选择权”交给我一次？'],c:[['不愿意','resist'],['只这一次','fear'],['愿意，你来选','obey']]},
{her:['那就写下来。','写：我只属于你。','写错的话，我会装作没看见。第一次。'],gate:true,c:[]}
];
let i=0,score={obey:0,fear:0,resist:0},history=[];const $=s=>document.querySelector(s),phone=$('#phone'),log=$('#log'),choices=$('#choices'),meter=$('#meter'),status=$('#status');
function tone(f=100,d=.08,type='sine'){try{let a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.frequency.value=f;o.type=type;g.gain.value=.035;o.connect(g);g.connect(a.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.stop(a.currentTime+d+.03)}catch(e){}}
function add(text,cls='her'){let d=document.createElement('div');d.className='msg '+cls;d.textContent=text;log.append(d);log.scrollTop=log.scrollHeight;return d}
function sys(t){let d=document.createElement('div');d.className='sys';d.textContent=t;log.append(d);log.scrollTop=log.scrollHeight}
function intro(){let m=document.createElement('div');m.className='modal';m.innerHTML='<div class="panel"><h1>亲密关系安全测试</h1><p>这次不是问卷皮了，改成聊天式分支互动。<br>有病娇、占有、压迫感与多结局。</p><button class="btn">打开消息</button><div class="warn">纯前端，不收集/上传数据；不适请关闭。</div></div>';document.body.append(m);m.querySelector('button').onclick=()=>{m.remove();phone.style.display='flex';runScene()}}
async function runScene(){choices.innerHTML='';meter.style.width=(i/scenes.length*100)+'%';let s=scenes[i];status.textContent=Math.random()>.5?'正在输入…':'看着你';for(const line of s.her){await wait(650+Math.random()*350);add(line,'her');tone(90+Math.random()*80,.04,'triangle')}if(s.effect==='rain')rain();if(s.effect==='black')glitch('你说要走的时候，我听见了。');if(s.gate)return gate();if(s.mutate)setTimeout(()=>mutateChoices(),900);s.c.forEach(([txt,type])=>{let b=document.createElement('button');b.className='choice '+(type==='obey'?'good':type==='resist'?'bad':'');b.textContent=txt;b.onclick=()=>choose(txt,type);choices.append(b)});}
function choose(txt,type){[...choices.children].forEach(b=>b.disabled=true);add(txt,'me');history.push(type);score[type]++;tone(type==='obey'?210:type==='fear'?120:70,.07,type==='resist'?'sawtooth':'sine');if(type==='resist'&&[2,4,10].includes(i))setTimeout(()=>add(['别用这种语气。','我可以等你改答案。','你越反抗，我越想确认。'][Math.floor(Math.random()*3)],'her'),500);i++;setTimeout(runScene,900)}
function mutateChoices(){[...choices.children].forEach((b,k)=>{let old=b.textContent;b.dataset.old=old;b.textContent=['不许这么说','重新选','乖一点'][k]||old;b.classList.add('bad')});setTimeout(()=>[...choices.children].forEach(b=>{b.textContent=b.dataset.old||b.textContent}),1400)}
function rain(){let words=['只看我','别回他','我会知道','乖','你跑不掉','喜欢你'];let arr=[];let tm=setInterval(()=>{for(let k=0;k<14;k++){let f=document.createElement('div');f.className='float';f.textContent=words[Math.floor(Math.random()*words.length)];f.style.left=Math.random()*100+'vw';f.style.top=Math.random()*100+'vh';f.style.fontSize=13+Math.random()*14+'px';document.body.append(f);arr.push(f)}},120);setTimeout(()=>{clearInterval(tm);arr.forEach(x=>x.remove())},3500)}
function glitch(text){let g=document.createElement('div');g.className='glitch';g.textContent='';document.body.append(g);let n=0;(function t(){g.textContent=text.slice(0,n++);tone(45+n*2,.025,'square');if(n<=text.length)setTimeout(t,70);else setTimeout(()=>g.remove(),1200)})()}
function gate(){choices.innerHTML='<input class="input" id="pass" placeholder="我只属于你"><button class="choice good" id="open">发送</button>';$('#open').onclick=()=>{let v=$('#pass').value.trim();if(v==='我只属于你'){add(v,'me');ending()}else{score.resist++;choices.classList.add('shake');setTimeout(()=>choices.classList.remove('shake'),900);add('写错了。再给你一次机会。','her');tone(55,.16,'sawtooth')}}}
function ending(){meter.style.width='100%';choices.innerHTML='';let tag,title,body;if(score.obey>=7){tag='依存真结局';title='《她替你按下发送》';body='你把选择权交出去的那一刻，她终于安静了。不是因为满足，而是因为从现在起，她不用再问。你的消息提示、联系人、夜归路线，都会变成她掌心里温顺的线。她说：别怕，我不是控制你，我是在保管你。'}else if(score.resist>=6){tag='追逐结局';title='《门锁外的爱》';body='你每一次拒绝都让她更确信：你只是还没有习惯被爱。聊天框熄灭后，门外传来很轻的震动声。不是敲门，是有人把额头贴在门上，一遍遍练习你的名字。'}else if(score.fear>=5){tag='软禁结局';title='《温柔的笼子》';body='你没有完全答应，也没有真正拒绝。于是她选择最温柔的方式：提醒、等待、哭泣、道歉，然后再次提醒。你仍然自由，只是每一次自由之前，都要先想起她会不会难过。'}else{tag='坏结局';title='《答案被她重写》';body='你的答案太平均了，她不喜欢这种模糊。屏幕闪了一下，所有“考虑”都变成“愿意”，所有“为什么”都变成“对不起”。她说：没关系，亲爱的，我比你更懂你。'}let e=document.createElement('div');e.className='ending';e.innerHTML=`<div class="paper"><span class="tag">${tag}</span><h2>${title}</h2><p>${body}</p><p class="score">服从 ${score.obey} / 恐惧 ${score.fear} / 反抗 ${score.resist}</p><p>她把这段聊天置顶了。你删不删都一样，她已经背下来了。</p><button class="btn" id="again">重新开始</button></div>`;document.body.append(e);$('#again').onclick=()=>{e.remove();i=0;score={obey:0,fear:0,resist:0};history=[];log.innerHTML='';runScene()}}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}intro();
</script></body></html>
