<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>亲密关系依恋类型小测</title>
<style>
:root{--bg:#f6f3ee;--paper:#fffdfa;--ink:#24201e;--muted:#81736e;--line:#e7ddd6;--soft:#f3ebe6;--accent:#7f2d35;--accent2:#b45a64;--bad:#2a0f13;--shadow:0 26px 80px rgba(70,42,30,.14)}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 50% 0,#fff 0,#f7f2ed 42%,#e9dfd7 100%);color:var(--ink);display:grid;place-items:center;padding:12px;overflow:hidden}.grain{position:fixed;inset:0;opacity:.045;pointer-events:none;background-image:repeating-radial-gradient(circle at 15% 20%,#000 0 1px,transparent 1px 3px)}
.app{position:relative;width:min(620px,100%);height:min(820px,94vh);background:var(--paper);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;display:none;flex-direction:column}.head{padding:22px 22px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(255,255,255,.55));position:relative}.toprow{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title{font-weight:850;font-size:23px;letter-spacing:.02em}.meta{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}.quit{border:0;background:transparent;color:#9a8a84;font-size:13px;padding:5px 0;cursor:pointer}.bar{height:5px;background:#eee2dc;border-radius:999px;overflow:hidden;margin-top:16px}.bar i{display:block;width:0;height:100%;background:linear-gradient(90deg,#2b2220,var(--accent));transition:width .35s}.body{padding:22px;display:flex;flex-direction:column;min-height:0;flex:1}.count{font-size:13px;color:var(--muted);margin-bottom:12px}.question{font-size:21px;line-height:1.55;font-weight:720;margin-bottom:8px;text-wrap:pretty}.note{font-size:13px;min-height:22px;color:var(--muted);margin-bottom:15px}.options{display:flex;flex-direction:column;gap:12px;overflow:auto;min-height:0;flex:1;padding-right:3px}.opt{width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:16px;min-height:54px;padding:14px 15px;font-size:16px;line-height:1.45;color:var(--ink);cursor:pointer;transition:.16s}.opt:hover{border-color:#cdb8b0;transform:translateY(-1px);box-shadow:0 10px 24px rgba(80,40,30,.07)}.opt.sel{background:#f7e8e8;border-color:var(--accent);box-shadow:0 0 0 2px rgba(127,45,53,.08)}.opt.changed{color:#8b3340}.nav{display:flex;gap:12px;justify-content:space-between;margin-top:18px}.btn{border:0;border-radius:14px;min-height:48px;padding:0 18px;font-size:16px;cursor:pointer}.prev{background:#eee7e2;color:#342b28}.next{background:#2b2422;color:white;min-width:128px}.next.ready{background:var(--accent)}.btn:disabled{opacity:.38;cursor:not-allowed}.modal,.veil,.result{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:22px}.modal{background:rgba(246,243,238,.78);backdrop-filter:blur(10px)}.panel{width:min(390px,92vw);background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:24px;text-align:center;box-shadow:0 28px 80px rgba(0,0,0,.16)}.panel h1,.panel h2{margin:0 0 12px;font-size:21px}.panel p{margin:0 0 18px;color:var(--muted);line-height:1.7}.start{width:100%;background:#2b2422;color:#fff}.small{font-size:12px;color:#9f4650;margin-top:12px}.veil{background:#070405;color:#b95a66;font-weight:700;letter-spacing:2px;text-align:center}.veil .typing{max-width:min(560px,92vw);line-height:2;white-space:pre-wrap}.whisper{position:fixed;z-index:18;color:#8c2c38;opacity:.12;font-weight:800;pointer-events:none;white-space:nowrap;animation:fade 2.2s infinite alternate}.result{background:#090606;color:#f5e6e4;overflow:auto;place-items:start center}.paper{width:min(640px,100%);min-height:86vh;border:1px solid #4a1b20;background:linear-gradient(180deg,#171010,#080505);border-radius:24px;padding:28px;line-height:1.85;box-shadow:0 0 90px rgba(120,20,30,.22)}.tag{display:inline-block;border:1px solid #6f2b34;color:#ffadb6;border-radius:999px;padding:4px 11px;font-size:13px}.paper h2{color:#ffd9dd;margin:12px 0 10px}.score{color:#ff9ba5;font-weight:800}.input{width:100%;border:1px solid #d9c8c2;border-radius:14px;padding:13px;font-size:16px;margin:8px 0 14px}.shake{animation:shake .11s linear 7}@keyframes fade{to{opacity:.28;transform:scale(1.04)}}@keyframes shake{50%{transform:translateX(5px)}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="grain"></div>
<main class="app" id="app">
  <header class="head"><div class="toprow"><div><div class="title">亲密关系依恋类型小测</div><div class="meta" id="meta">预计 3 分钟｜答案仅在本页计算，不会上传</div></div><button class="quit" id="quit">退出测试</button></div><div class="bar"><i id="bar"></i></div></header>
  <section class="body"><div class="count" id="count"></div><div class="question" id="q"></div><div class="note" id="note"></div><div class="options" id="opts"></div><div class="nav"><button class="btn prev" id="prev">上一题</button><button class="btn next" id="next">下一题</button></div></section>
</main>
<script>
const data=[
{q:'当一段关系刚开始变亲近时，你通常会怎么做？',n:'先从正常的问题开始。',o:[['保持自己的节奏，不急着靠太近','boundary'],['会期待更频繁的联系','cling'],['观察对方是否稳定可靠','observe'],['看感觉，舒服就继续','safe']]},
{q:'如果对方半天没有回复消息，你更可能想到什么？',n:'没有标准答案。',o:[['他/她可能在忙','safe'],['是不是我说错话了','cling'],['我也不想显得太在意','boundary'],['想看一下最后在线时间','observe']]},
{q:'你能接受恋人记住你的作息和习惯吗？',n:'比如几点睡、常走哪条路、喜欢喝什么。',o:[['可以，细心是好事','safe'],['有一点温暖','cling'],['要看记到什么程度','observe'],['太细会让我不舒服','boundary']]},
{q:'如果对方说“我只是想更了解你”，你会？',n:'这句话本身没有问题。',o:[['愿意分享一部分','safe'],['希望对方也同样分享','safe'],['先问为什么想知道','observe'],['下意识回避','boundary']]},
{q:'下面哪句话更接近你对“边界”的理解？',n:'请认真选，这题会影响后续题目。',o:[['爱也需要边界','boundary'],['边界可以慢慢协商','safe'],['太清楚的边界会显得生分','cling'],['边界是给外人的','cling']]},
{q:'如果恋人希望你睡前说一声“晚安”，你会？',n:'只是一个小习惯。',o:[['可以，这很正常','safe'],['很愿意，这让我安心','cling'],['偶尔忘记也不该被责怪','boundary'],['想知道对方为什么需要这个','observe']]},
{q:'如果你忘了说，对方第二天明显失落，你会？',n:'页面停顿了一下。',o:[['道歉，然后解释原因','safe'],['以后一定不忘','cling'],['觉得压力有点大','boundary'],['注意到对方在测试我','observe']]},
{q:'如果测试继续问：你愿意每天固定报备位置吗？',n:'抱歉，这题好像不属于依恋类型。',o:[['不愿意，这越界了','boundary'],['特殊情况可以','safe'],['如果能让对方安心，可以','cling'],['为什么突然问这个？','observe']]},
{q:'刚才那题让你不舒服了吗？',n:'这不是测评分数，只是确认一下。',o:[['有一点','boundary'],['还好','safe'],['没有，我能理解','cling'],['你为什么知道我不舒服？','observe']]},
{q:'如果一个人总能猜到你的反应，你会觉得？',n:'比如现在。',o:[['说明他/她很了解我','cling'],['有点厉害，但也有点怪','observe'],['要看这种了解怎么来的','safe'],['我会警惕','boundary']]},
{q:'你是否愿意让恋人看见你脆弱、依赖的一面？',n:'正常题目。',o:[['愿意，但需要信任','safe'],['很愿意，我希望被接住','cling'],['不太习惯','boundary'],['我会先判断对方是否安全','observe']]},
{q:'如果对方说“你不需要那么独立”，你会？',n:'这句话可能是安慰，也可能不是。',o:[['感到被理解','cling'],['觉得温柔，但仍保留自己','safe'],['不喜欢这种说法','boundary'],['想知道他/她想让我放下什么','observe']]},
{q:'如果某个选项突然变了，你会继续测试吗？',n:'请选择前，先看清楚四个选项。',special:'mutate',o:[['不会，我会退出','boundary'],['会，但会提高警惕','observe'],['也许这只是设计效果','safe'],['会，因为我想知道后面是什么','cling']]},
{q:'你希望一段关系最终变成什么样？',n:'它把“最终”两个字加粗了。',o:[['亲密但彼此自由','safe'],['稳定、明确、互相选择','safe'],['谁也离不开谁','cling'],['不要失去自我','boundary']]},
{q:'如果对方想把你的答案保存下来，你会？',n:'本页不会上传。但故事里“对方”想保存。',o:[['拒绝','boundary'],['保存前要经过我同意','safe'],['如果只是对方看，可以','cling'],['我会问保存在哪里','observe']]},
{q:'你注意到这些题越来越不像普通测试了吗？',n:'请诚实。',o:[['注意到了','observe'],['早就觉得不对','boundary'],['有一点，但还能接受','safe'],['没关系，我想继续','cling']]},
{q:'如果现在给你一个正常退出的机会，你会？',n:'这是一个真正的分支。',o:[['退出，看到普通结果','exit'],['继续，看到完整结果','observe'],['继续，我不想半途而废','safe'],['继续，我想知道它想说什么','cling']]},
{q:'最后一题：你认为“被需要”和“被占有”之间的距离是？',n:'它在等你的答案。',o:[['很远，中间有尊重','safe'],['取决于双方是否愿意','safe'],['有时只有一步','observe'],['如果是爱的人，也许没有距离','cling']]}
];
let cur=0,ans=Array(data.length).fill(null),score={safe:0,cling:0,boundary:0,observe:0},earlyExit=false,wrong=0;
const $=s=>document.querySelector(s),app=$('#app'),q=$('#q'),note=$('#note'),opts=$('#opts'),count=$('#count'),bar=$('#bar'),prev=$('#prev'),next=$('#next'),meta=$('#meta');
function intro(){let m=document.createElement('div');m.className='modal';m.innerHTML='<div class="panel"><h1>亲密关系依恋类型小测</h1><p>前半段是普通依恋测试。后半段会根据你的选择轻微改变。<br>它应该像“哪里不太对”，而不是一开始就吓你。</p><button class="btn start">开始测试</button><div class="small">纯前端本地计算，无联网提交。</div></div>';document.body.append(m);m.querySelector('button').onclick=()=>{m.remove();app.style.display='flex';render()}}
function recalc(){score={safe:0,cling:0,boundary:0,observe:0};ans.forEach(a=>{if(a&&score[a.type]!=null)score[a.type]++})}
function render(){clearFx();let d=data[cur];let qq=d.q, nn=d.n;if(cur>8&&score.observe>=3)nn='你比大多数人更早注意到了。';if(cur>9&&score.cling>=5)nn='它似乎更愿意把问题问得亲密一点。';if(cur>9&&score.boundary>=5)nn='你一直在保护边界，它开始变得客气。';q.textContent=qq;note.textContent=nn;count.textContent=`第 ${cur+1} 题 / 共 ${data.length} 题`;bar.style.width=((cur+1)/data.length*100)+'%';opts.innerHTML='';d.o.forEach((it,idx)=>{let b=document.createElement('button');b.className='opt'+(ans[cur]?.idx===idx?' sel':'');b.textContent=it[0];b.onclick=()=>choose(idx,it[1],b);opts.append(b)});prev.disabled=cur===0;next.disabled=!ans[cur];next.classList.toggle('ready',!!ans[cur]);next.textContent=cur===data.length-1?'查看结果':'下一题';if(d.special==='mutate')setTimeout(mutate,900)}
function choose(idx,type,el){ans[cur]={idx,type};recalc();[...opts.children].forEach(x=>x.classList.remove('sel'));el.classList.add('sel');next.disabled=false;next.classList.add('ready');if(cur===7&&type==='boundary')softVeil('这才是正常反应。');if(cur===9&&type==='observe')whispers(['你注意到了','不是错觉','继续看']);if(cur===16&&type==='exit'){earlyExit=true;finalGate(true)}}
function mutate(){if(cur!==12)return;let a=[...opts.children],old=a.map(x=>x.textContent);if(a[3]){a[3].textContent='会，因为它已经问到这里了';a[3].classList.add('changed')}setTimeout(()=>{a.forEach((x,i)=>{if(!x.classList.contains('sel'))x.textContent=old[i]})},1800)}
function clearFx(){document.querySelectorAll('.veil,.whisper').forEach(e=>e.remove())}
function softVeil(t){let v=document.createElement('div');v.className='veil';v.innerHTML='<div class="typing"></div>';document.body.append(v);let box=v.firstChild,n=0;(function step(){box.textContent=t.slice(0,n++);if(n<=t.length)setTimeout(step,70);else setTimeout(()=>v.remove(),900)})()}
function whispers(words){let arr=[],tm=setInterval(()=>{for(let i=0;i<9;i++){let w=document.createElement('div');w.className='whisper';w.textContent=words[Math.floor(Math.random()*words.length)];w.style.left=Math.random()*100+'vw';w.style.top=Math.random()*100+'vh';w.style.fontSize=13+Math.random()*11+'px';document.body.append(w);arr.push(w)}},160);setTimeout(()=>{clearInterval(tm);arr.forEach(x=>x.remove())},2800)}
function needPick(){let m=document.createElement('div');m.className='modal';m.innerHTML='<div class="panel"><h2>还有一题空着</h2><p>这次不能跳过。不是强迫，只是结果需要每一题都有答案。</p><button class="btn start">回去选择</button></div>';document.body.append(m);m.querySelector('button').onclick=()=>m.remove()}
function finalGate(normal=false){app.style.display='none';if(normal)return ending('exit');let m=document.createElement('div');m.className='modal';m.innerHTML='<div class="panel"><h2>测试完成</h2><p>结果已经生成。<br>输入页面上反复出现的两个字查看完整结果。</p><input class="input" id="pass" placeholder="提示：边界"><button class="btn start" id="open">查看结果</button><div class="small">如果不想输入，也可以刷新页面退出。</div></div>';document.body.append(m);m.querySelector('#open').onclick=()=>{let v=m.querySelector('#pass').value.trim();if(v==='边界'){m.remove();ending()}else{wrong++;m.querySelector('.panel').classList.add('shake');setTimeout(()=>m.querySelector('.panel').classList.remove('shake'),800);m.querySelector('.small').textContent=wrong>1?'它不是要承诺，只是要你记得边界。':'提示就在很多题里。'}}}
function ending(forced){recalc();let tag,title,body;if(forced==='exit'||earlyExit){tag='正常退出结局';title='《你保留了选择权》';body='你在它真正越界前停下了。结果很普通：你重视亲密，也重视边界。页面没有挽留你，这反而让它看起来终于正常了一点。';}
else if(score.boundary>=6){tag='边界清晰型';title='《门可以关上》';body='你能靠近，也能拒绝。最微妙的是：当问题开始越界，你没有急着证明自己勇敢，而是把“不舒服”当成有效信息。那个声音最后变得很轻，因为它知道你不会把钥匙交出去。';}
else if(score.observe>=6){tag='异常察觉型';title='《你看见了题目背后的人》';body='你没有完全被内容带着走。你在意题目为什么这样问、信息从哪里来、选项为什么改变。测试没有困住你，反而被你观察。最后留下来的不是恐惧，是一个很冷静的问题：是谁设计了这些问题？';}
else if(score.cling>=7){tag='温柔依附型';title='《被需要的房间》';body='你并不讨厌被记住，甚至有一点享受被需要。于是问题越来越贴近你，像一间慢慢收窄的房间：不疼，也不黑，只是门把手被很温柔地握在了另一个人手里。';}
else{tag='稳定亲密型';title='《靠近，但不消失》';body='你的答案大多落在中间：愿意亲近，也保留自己。那些异常的题目没能把你推向极端。或许健康的亲密就是这样——有人走近时，你不必逃；有人越界时，你也不必笑着接受。';}
let r=document.createElement('div');r.className='result';r.innerHTML=`<div class="paper"><span class="tag">${tag}</span><h2>${title}</h2><p>${body}</p><p class="score">稳定 ${score.safe} / 依附 ${score.cling} / 边界 ${score.boundary} / 察觉 ${score.observe}</p><p>这版没有“突然发疯”的人，只有一个逐渐暴露意图的测试。真正的不适感，应该来自你发现它越问越具体。</p><button class="btn start" id="again">重新测试</button></div>`;document.body.append(r);r.querySelector('#again').onclick=()=>{r.remove();cur=0;ans=Array(data.length).fill(null);earlyExit=false;wrong=0;app.style.display='flex';render()}}
prev.onclick=()=>{if(cur>0){cur--;render()}};next.onclick=()=>{if(!ans[cur])return needPick(); if(cur<data.length-1){cur++;render()}else finalGate()};$('#quit').onclick=()=>{earlyExit=true;finalGate(true)};intro();
</script>
</body></html>
